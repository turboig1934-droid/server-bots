name: Minecraft Bot Runner

on:
  workflow_dispatch:
    inputs:
      runners_count:
        description: 'Number of runners'
        required: true
        default: '3'
        options:
          - '1'
          - '2'
          - '3'
          - '5'
          - '10'

jobs:
  bot_runner:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        runner: [1, 2, 3, 4, 5]
      max-parallel: 3
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: |
          npm install mineflayer
          
      - name: Create config
        run: |
          cat > config.json << 'EOF'
          {
            "server_ip": "node.harshteotia.in",
            "server_port": 25566,
            "username_prefix": "Bot",
            "bots_per_runner": 100,
            "bot_spawn_delay": 200,
            "enable_auto_reconnect": true,
            "video_helper_mode": true,
            "command_prefix": "!",
            "max_bots": 100,
            "server_version": "1.16.5"
          }
          EOF
          
      - name: Set runner ID
        run: |
          echo "RUNNER_ID=${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}_${{ matrix.runner }}" >> $GITHUB_ENV
          
      - name: Run bot
        env:
          RUNNER_ID: ${{ env.RUNNER_ID }}
        run: |
          echo "🤖 Starting bot runner ${{ matrix.runner }}"
          node bot.js
          
      - name: Keep alive
        if: always()
        run: |
          while true; do
            echo "Runner ${{ matrix.runner }} is alive"
            sleep 300
          done
